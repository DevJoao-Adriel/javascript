<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        h1{
            font: normal 30pt arial;
            background-image: linear-gradient(to bottom, green, yellow);
            padding: 45px;
            color: black;
            text-align: center;
        }

        span{
            font: normal 20pt arial;
        }
        #naci{
            width: 30vh;
            height: 25px;
            text-align: center;
        }

        #botao{
            background-color: rgb(85, 237, 85);
            width: 10vh;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
        }

        #botao:active{
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        #resu{
            font: normal 20pt arial;
        }
    </style>
</head>
<body>
    <h1>Questionário de nacionalidade</h1>
    <span>Digite o país onde você mora:</span> <input type="text" id="naci">
    <input type="button" value="confirmar" onclick="descobrir_naci()" id="botao">
    <div id="resu">

    </div>
    <script>
        var naci = document.querySelector('#naci')
        var resu = document.querySelector('#resu')

        function descobrir_naci(){
            var nacionalidade = naci.value
            if (nacionalidade.toUpperCase() == 'BRASIL' || nacionalidade.toUpperCase() == 'BRA'){
                resu.innerHTML = (`<p>Você mora no ${nacionalidade}, logo você é brasileiro</p>`)        
            } else{
                resu.innerHTML = (`Você mora no[a] ${nacionalidade} logo você é estrangeiro`)
            }
        }
    </script>
</body>
</html>
